name: GitHub Actions Fundamentals

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  fundamentals:
    name: GitHub Actions Basics
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Display Runner Information
        run: |
          echo "===== Runner Information ====="
          echo "Date: $(date)"
          echo "User: $(whoami)"
          echo "Hostname: $(hostname)"
          echo "Operating System:"
          cat /etc/os-release

      - name: Display Development Tools
        run: |
          echo "===== Installed Tools ====="
          echo "Python: $(python3 --version)"
          echo "Git: $(git --version)"
          echo "Bash: $(bash --version | head -n 1)"

      - name: Show Repository Contents
        run: |
          echo "===== Repository Files ====="
          ls -lah

      - name: Create Sample Artifact
        run: |
          mkdir -p output
          echo "GitHub Actions Fundamentals Lab" > output/lab-info.txt
          echo "Execution Date: $(date)" >> output/lab-info.txt
          echo "Workflow: ${{ github.workflow }}" >> output/lab-info.txt
          echo "Repository: ${{ github.repository }}" >> output/lab-info.txt
          echo "Triggered by: ${{ github.actor }}" >> output/lab-info.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lab-information
          path: output/lab-info.txt

      - name: Workflow Summary
        run: |
          echo "=================================="
          echo "Workflow completed successfully."
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "=================================="
